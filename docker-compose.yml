services:

  ollama:
    image: ollama/ollama:0.5.7
    container_name: chatbotbo_ollama
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_THREADS=0
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-setup:
    image: ollama/ollama:0.5.7
    container_name: chatbotbo_setup
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./backend/app/core/Modelfile:/Modelfile:ro
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        echo 'Esperando Ollama...'
        until ollama list >/dev/null 2>&1; do
          echo 'Ollama no responde todavía. Reintentando en 3s...'
          sleep 3
        done
        echo 'Descargando modelo hf.co/unsloth/Qwen3-4B-Instruct-2507-GGUF:Q3_K_M...'
        until ollama pull hf.co/unsloth/Qwen3-4B-Instruct-2507-GGUF:Q3_K_M ; do
          echo 'Fallo de red durante el pull. Reintentando en 20s...'
          sleep 20
        done
        echo 'Creando modelo correos-bot desde Modelfile...'
        until ollama create correos-bot -f /Modelfile; do
          echo 'No se pudo crear correos-bot. Reintentando en 10s...'
          sleep 10
        done
        echo 'Modelo listo!'
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: chatbotbo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: chatbotbo_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatbot:
    build:
      context: ./backend/app
      dockerfile: ../../Dockerfile
    container_name: chatbotbo_app
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - chroma_data:/app/chroma_db
      - ./backend/app/data:/app/data
      - ./frontend:/frontend:ro
    environment:
      - OLLAMA_URL=http://ollama:11434/api/chat
      - OLLAMA_TIMEOUT=600
      - OLLAMA_NUM_PREDICT=300
      - OLLAMA_RETRIES=1
      - LLM_RESPONSE_TIMEOUT=600
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_TTL=3600
      - REDIS_EMBEDDING_CACHE=true
      - REDIS_RESPONSE_CACHE=true
      - REDIS_RESPONSE_CACHE_TTL=86400
      - LLM_MODEL=correos-bot
      - EMBEDDING_MODEL=intfloat/multilingual-e5-small
      - RERANKER_ENABLED=true
      - RERANKER_MODEL=cross-encoder/mmarco-mMiniLMv2-L12-H384-v1
      - RAG_VECTOR_STORE=qdrant
      - QDRANT_URL=http://qdrant:6333
      - TRITON_URL=http://triton:8000
      - USE_TRITON=false
      - CHROMA_PATH=/app/chroma_db
      - CHUNK_SIZE=400
      - BATCH_SIZE=500
      - N_RESULTADOS=5
      - MAX_CONTEXT_CHARS=1500
      - MAX_CONTEXT_TOKENS=700
      - PYTHONUNBUFFERED=1
      - UVICORN_WORKERS=1
      - PYTHONPATH=/app
      - CHATBOT_GENERAL_ONLY=false
      - REQUIRE_EVIDENCE=false
      - CHAT_RESPONSE_MAX_CHARS=0
      - TRACKING_API_VERIFY_SSL=false
      # API externa de tarifas (proyecto chatbotbo)
      # En Docker: usa el nombre del servicio o container_name de chatbotbo
      # Si esta en otro puerto/host, cambia esta URL
      - TARIFF_API_URL=http://chatbotbo_app:5000
      - POSTAR_API_URL=https://postar.correos.gob.bo:8104/api/calcular
      - POSTAR_API_TIMEOUT=20
      - POSTAR_API_VERIFY_SSL=false
    command: sh -c "uvicorn main:app --host 0.0.0.0 --port 5000 --workers $${UVICORN_WORKERS:-1}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  ollama_data:
  chroma_data:
  redis_data:
