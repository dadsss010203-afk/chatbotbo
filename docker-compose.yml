services:

  ollama:
    image: ollama/ollama:0.5.7
    container_name: chatbotbo_ollama
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-setup:
    image: ollama/ollama:0.5.7
    container_name: chatbotbo_setup
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./backend/app/core/Modelfile:/Modelfile:ro
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        echo 'Esperando Ollama...' &&
        sleep 5 &&
        ollama pull llama3.2:1b &&
        ollama create correos-bot -f /Modelfile &&
        echo 'Modelo listo!'
      "
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: chatbotbo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatbotbo_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: ./backend/app
      dockerfile: ../../Dockerfile
    container_name: chatbotbo_celery
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - REDIS_URL=redis://redis:6379/0
      - RAG_VECTOR_STORE=qdrant
      - QDRANT_URL=http://qdrant:6333
      - TRITON_URL=http://triton:8000
      - USE_TRITON=false
      - EMBEDDING_MODEL=paraphrase-multilingual-MiniLM-L12-v2
      - CHROMA_PATH=/app/chroma_db
      - CHUNK_SIZE=600
      - BATCH_SIZE=500
      - N_RESULTADOS=3
      - PYTHONPATH=/app
      - HF_HOME=/tmp/huggingface_cache
    volumes:
      - ./backend/app/data:/app/data
    healthcheck:
      disable: true
    command: celery -A celery_app:celery worker --loglevel=info --uid=nobody --gid=nogroup

  chatbot:
    build:
      context: ./backend/app
      dockerfile: ../../Dockerfile
    container_name: chatbotbo_app
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - chroma_data:/app/chroma_db
      - ./backend/app/data:/app/data
      - ./frontend:/frontend:ro
    environment:
      - OLLAMA_URL=http://ollama:11434/api/chat
      - OLLAMA_TIMEOUT=240
      - OLLAMA_NUM_PREDICT=220
      - OLLAMA_RETRIES=1
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_TTL=3600
      - REDIS_EMBEDDING_CACHE=true
      - LLM_MODEL=correos-bot
      - EMBEDDING_MODEL=paraphrase-multilingual-MiniLM-L12-v2
      - RAG_VECTOR_STORE=qdrant
      - QDRANT_URL=http://qdrant:6333
      - TRITON_URL=http://triton:8000
      - USE_TRITON=false
      - CHROMA_PATH=/app/chroma_db
      - CHUNK_SIZE=600
      - BATCH_SIZE=500
      - N_RESULTADOS=2
      - PYTHONUNBUFFERED=1
      - UVICORN_WORKERS=1
      - PYTHONPATH=/app
      - CHATBOT_GENERAL_ONLY=false
      - REQUIRE_EVIDENCE=false
      - CHAT_RESPONSE_MAX_CHARS=0
      - TRACKING_API_VERIFY_SSL=false
    command: sh -c "uvicorn main:app --host 0.0.0.0 --port 5000 --workers $${UVICORN_WORKERS:-1}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  ollama_data:
  chroma_data:
  redis_data:
  qdrant_data:
