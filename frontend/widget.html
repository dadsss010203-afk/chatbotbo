<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Bubble - Correos de Bolivia</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="widget.css">
</head>
<body>

<!-- Chat Bubble -->
<button id="chat-bubble" onclick="toggleChat()" aria-label="Abrir asistente">
  <svg viewBox="0 0 24 24"><path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  <div id="badge"></div>
</button>

<!-- Chat Window -->
<div id="chat-window">
  <div id="translate-banner"></div>

  <!-- Header -->
  <header>
    <div class="h-inner">
      <div class="h-row1">
        <div class="h-brand">
          <div>
            <div class="h-name">Correos de Bolivia</div>
            <div class="h-sub">Agencia Boliviana de Correos</div>
          </div>
        </div>
        <div class="h-btns">
          <button class="hb" onclick="clearConv()" title="Limpiar conversación">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          </button>
          <button class="hb" onclick="openMap()" title="Ver sucursales">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          </button>
          <button class="hb" onclick="minimize()" title="Minimizar">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H5v-2h14v2z"/></svg>
          </button>
          <button class="hb" onclick="toggleChat()" title="Cerrar">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </div>
      <div class="h-row2">
        <div class="langs">
          <button class="lpill on" data-lang="es" onclick="setLang('es')">🇧🇴 ES</button>
          <button class="lpill" data-lang="en" onclick="setLang('en')">🇺🇸 EN</button>
          <button class="lpill" data-lang="fr" onclick="setLang('fr')">🇫🇷 FR</button>
          <button class="lpill" data-lang="pt" onclick="setLang('pt')">🇧🇷 PT</button>
          <button class="lpill" data-lang="zh" onclick="setLang('zh')">🇨🇳 ZH</button>
          <button class="lpill" data-lang="ru" onclick="setLang('ru')">🇷🇺 RU</button>
        </div>
      </div>
    </div>
    <div class="h-stripe"></div>
  </header>

  <!-- Chat Area: solo chips, sin .wc-sub ni .wc-sep -->
  <div id="chat">
  </div>

  <!-- Form Area -->
  <div id="form-area">
    <form id="form">
      <input id="input" type="text" placeholder="Escriba su consulta aquí…" autocomplete="off"/>
      <button type="button" id="stop" onclick="stopResp()">
        <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"/></svg>
      </button>
      <button type="submit" id="send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </form>
    <div class="f-meta">
      <span class="f-hint">Enter para enviar</span>
      <span class="f-brand">Powered by <b>AGBC IA</b></span>
    </div>
  </div>

  <!-- Confirm Bar -->
  <div id="confirm-bar">
    <p>¿Borrar <span>toda la conversación</span>?</p>
    <div class="c-btns">
      <button class="cno" onclick="closeConf()">Cancelar</button>
      <button class="csi" onclick="doClear()">Confirmar</button>
    </div>
  </div>
</div>

<!-- Map Modal -->
<div id="mapa-modal">
  <div id="mapa-cnt">
    <div id="mapa-hdr">
      <div>
        <h3>Red de Sucursales</h3>
        <small>Agencia Boliviana de Correos · Bolivia</small>
      </div>
      <button id="close-map" onclick="closeMap()">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="mapa-stripe"></div>
    <div id="mapa"></div>
    <div id="suc-list"></div>
  </div>
</div>

</body>
</html>
