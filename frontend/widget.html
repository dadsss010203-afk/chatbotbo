<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Bubble - Correos de Bolivia</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/widget.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<button id="chat-bubble" onclick="toggleChat()" aria-label="Abrir asistente">
  <img src="/logo_chatbot.png" alt="Chatbot Logo" class="bubble-logo" style="width: 95px; height: 95px; object-fit: cover; object-position: center; border-radius: 8px;">
  <div id="badge"></div>
</button>

<div id="chat-window">
  <div id="translate-banner"></div>

  <header>
    <div class="h-inner">
      <div class="h-row1">
        <div class="h-brand">
          <div>
            <div class="h-name">Correos de Bolivia</div>
          </div>
        </div>
        <div class="h-btns">
          <button class="hb" onclick="minimize()" title="Minimizar">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H5v-2h14v2z"/></svg>
          </button>
          <button class="hb" onclick="toggleChat()" title="Cerrar">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </div>
      <div class="h-row2">
        <div class="langs">
          <button class="lpill on" data-lang="es" onclick="setLang('es')">🇧🇴 ES</button>
          <button class="lpill" data-lang="en" onclick="setLang('en')">🇺🇸 EN</button>
        </div>
      </div>
    </div>
    <div class="h-stripe"></div>
  </header>

  <div id="chat"></div>

  <div id="sucursal-menu" style="display:none;position:absolute;bottom:70px;right:11px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;box-shadow:var(--shd2);overflow:hidden;z-index:100;animation:winIn 0.2s cubic-bezier(.22,1,.36,1)">
    <button onclick="closeSucursalMenu();openMap();" style="display:flex;align-items:center;gap:9px;width:100%;padding:10px 16px;border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;color:var(--ink2);transition:background 0.18s;white-space:nowrap;">
      Ver todas las sucursales
    </button>
    <div style="height:1px;background:var(--border);margin:0 10px"></div>
    <button onclick="closeSucursalMenu();findNearestBranch();" style="display:flex;align-items:center;gap:9px;width:100%;padding:10px 16px;border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;color:var(--ink2);transition:background 0.18s;white-space:nowrap;">
      La más cercana a mí
    </button>
  </div>

  <div id="form-area">
    <form id="form">
      <input id="input" type="text" placeholder="Escriba su consulta aquí…" autocomplete="off"/>
      <button type="button" id="stop" onclick="stopResp()">
        <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"/></svg>
      </button>
      <button type="submit" id="send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <button type="button" id="refresh-btn" onclick="clearConv()" title="Nueva conversación" style="width:38px;height:38px;border-radius:11px;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.3s;">
        <svg viewBox="0 0 24 24" style="width:75%;height:75%;" fill="var(--ink3)">
          <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
      </button>
    </form>
    <div class="f-meta">
      <span class="f-hint">Enter para enviar</span>
      <button type="button" id="tarifa-toggle" class="tarifa-toggle" onclick="toggleTarifaMode()">Tarifas</button>
      <button type="button" id="tracking-toggle" class="tracking-toggle" onclick="toggleTrackingMode()">Rastreo</button>
      <button type="button" id="nearby-toggle" class="nearby-toggle" onclick="toggleSucursalMenu()">Sucursales</button>
    </div>
  </div>

  <div id="confirm-bar">
    <p>¿Borrar <span>toda la conversación</span>?</p>
    <div class="c-btns">
      <button class="cno" onclick="closeConf()">Cancelar</button>
      <button class="csi" onclick="doClear()">Confirmar</button>
    </div>
  </div>
</div>

<div id="mapa-modal">
  <div id="mapa-cnt">
    <div id="mapa-hdr">
      <div><h3>Red de Sucursales</h3><small>Correos de Bolivia</small></div>
      <button id="close-map" onclick="closeMap()">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="mapa-stripe"></div>
    <div id="mapa"></div>
    <div id="suc-list"></div>
  </div>
</div>

<script src="/widget.js" data-api="/api"></script>
</body>
</html>
